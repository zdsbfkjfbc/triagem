[mypy]
python_version = 3.10
files = src,tests,scripts,config
exclude = (^|[\\/])(\.agent|\.venv|\.mypy_cache|\.ruff_cache|\.pytest_cache|pytest-cache-files-.*)([\\/]|$)
ignore_missing_imports = True
disable_error_code = import-untyped,import-not-found,valid-type,misc,arg-type,assignment,annotation-unchecked
